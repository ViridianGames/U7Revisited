# Global parameters
name = Ultima VII Revisited

# Path to your U7 folder
# should be something like "Data/U7" or "Data/U7/blackgate"
data_path = Data/U7

# Font path for GUI system
FontPath = Data/Fonts/

# Sprite path for GUI system
SpritePath = Images/

# Audio path for GUI system
AudioPath = Audio/

# Scripted SFX bank: mt32 or adlib (files under Audio/SFX/<bank>/U7BG_SFX_<bank>_NNN.wav)
sfx_bank = mt32

# Voice: Audio/Voice/U7BG_voice_NNN.wav  (per-egg links in LoadingState, e.g. egg 31 -> 023)
# Music: Audio/Music/NNbg.ogg            (set by BuildU7MusicPath)

# 320x180, 640x360, 800x450, 960x540, 1280x720, 1600x900, 1920x1080, 2560x1440
# Screen parameters
h_res = 1920
v_res = 1080
h_renderres = 640
v_renderres = 360

bpp = 32
full_screen = 0
field_of_view = 10
fast_terrain = 0

camera_zoom_speed = .2
camera_rotate_accelerate = 10
camera_rotate_topspeed = 4
camera_pan_accelerate = 10
camera_pan_topspeed = 15

camera_close_limit = 18
camera_far_limit = 36

ortho_zoom = .15

sound_volume = 100
music_volume = 50

# Default max distance (world tiles) for spatial SFX/instruments (volume + stereo pan)
spatial_sound_default_range = 32

# How quickly spatial volume/pan catch up when the camera moves (higher = snappier, lower = smoother)
spatial_sound_smooth_speed = 8

milliseconds_between_updates = 16.6666

port = 43000
turn_length = 3